kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: argocd-extended-apis
rules:
  - apiGroups:
      - cluster.open-cluster-management.io
    resources:
      - managedclustersets
    verbs:
      - create
      - update
      - delete
  - apiGroups:
      - cluster.open-cluster-management.io
    resources:
      - managedclusters
    verbs:
      - update
  - apiGroups:
      - cluster.open-cluster-management.io
    resources:
      - managedclustersets/join
      - managedclustersets/bind
    verbs:
      - create
